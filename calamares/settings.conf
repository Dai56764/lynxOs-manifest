# ═══════════════════════════════════════════════════════════════
#  Calamares settings.conf для LynxOS
#  Графический установщик ОС
# ═══════════════════════════════════════════════════════════════

---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
  - id:       rootfs
    type:     unpackfs
    config:   unpackfs.conf

  - id:       mount
    type:     mount

  - id:       umount
    type:     umount

  - id:       shellprocess-first
    type:     shellprocess
    config:   shellprocess-first.conf

  - id:       interactiveterminal
    type:     interactiveterminal

  - id:       netinstall
    type:     netinstall
    config:   netinstall.conf

  - id:       locale
    type:     locale
    config:   locale.conf

  - id:       keyboard
    type:     keyboard
    config:   keyboard.conf

  - id:       partition
    type:     partition
    config:   partition.conf

  - id:       mount
    type:     mount

  - id:       fstab
    type:     fstab
    config:   fstab.conf

  - id:       shellprocess-before
    type:     shellprocess
    config:   shellprocess-before.conf

  - id:       initcpiocfg
    type:     initcpio
    config:   initcpio.conf

  - id:       initcpio
    type:     initcpio

  - id:       grub
    type:     grub
    config:   grub.conf

  - id:       grubcfg
    type:     grubcfg
    config:   grubcfg.conf

  - id:       bootloader
    type:     bootloaderchooser
    config:   bootloaderchooser.conf

  - id:       users
    type:     users
    config:   users.conf

  - id:       displaymanager
    type:     displaymanager
    config:   displaymanager.conf

  - id:       networkcfg
    type:     networkcfg
    config:   networkcfg.conf

  - id:       hwclock
    type:     hwclock
    config:   hwclock.conf

  - id:       services-systemd
    type:     services-systemd
    config:   services-systemd.conf

  - id:       shellprocess-final
    type:     shellprocess
    config:   shellprocess-final.conf

  - id:       umountall
    type:     umount

  - id:       checksum
    type:     checksum
    config:   checksum.conf

  - id:       plasmalnf
    type:     plasmalnf
    config:   plasmalnf.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - shellprocess-first
      - locale
      - keyboard
      - fstab
      - shellprocess-before
      - initcpiocfg
      - initcpio
      - grub
      - grubcfg
      - bootloader
      - displaymanager
      - services-systemd
      - networkcfg
      - hwclock
      - shellprocess-final
      - checksum
      - umountall
  - show:
      - finished

branding: default

framebuffer: false

prompt-install: true

dont-report-on-autstart: false
