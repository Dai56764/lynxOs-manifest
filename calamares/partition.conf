# ═══════════════════════════════════════════════════════════════
#  Calamares partition.conf для LynxOS
#  Конфигурация разметки диска
# ═══════════════════════════════════════════════════════════════

---
unsquashfsOptions: -nolc -nolls -noI -noD -noF -noX -noS -noC

partitionLayout:
  - name: "EFI"
    description: "EFI System Partition"
    size: 512M
    filesystem: vfat
    flags: [ boot, esp ]
  - name: "root"
    description: "Root Filesystem"
    filesystem: ext4
    flags: []

initialPartitioningChoice: unpartitioned_available_space_only
initialSwapChoice: file

allowManualPartitioning: true

drawNestedPartitions: false

alignPartitionToGridSize: 1048576  # 1MB

partitionSeparateBoot: false
partitionSeparateHome: false
partitionSeparateVar: false
partitionSeparateTmp: false
